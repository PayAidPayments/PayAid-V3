services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: payaid
      POSTGRES_USER: payaid
      POSTGRES_PASSWORD: payaid_secret
    ports:
      - "5433:5432"   # host 5433 to avoid conflict with other Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payaid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 to avoid conflict with Redis on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU: uncomment below and use: docker compose up -d
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ONLYOFFICE – optional; uncomment if you need /docs/editor. Large image; if Docker returns 500, start without it.
  # onlyoffice:
  #   image: onlyoffice/documentserver:latest
  #   ports:
  #     - "8081:80"
  #   environment:
  #     JWT_ENABLED: "false"
  #   volumes:
  #     - onlyoffice_data:/var/www/onlyoffice/Data
  #     - onlyoffice_log:/var/log/onlyoffice

  # Baileys: run via Node (pnpm run whatsapp:worker) – no container; queue uses Redis

  # Phase 5 AI: Chroma (RAG), OpenWebUI (chat). Start with: docker compose --profile ai up -d
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    profiles:
      - ai

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3005:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
    profiles:
      - ai

volumes:
  pgdata: {}
  ollama_data: {}
  chroma_data: {}
  # onlyoffice_data: {}
  # onlyoffice_log: {}
