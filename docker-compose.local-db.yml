services:
  postgres:
    image: postgres:15-alpine
    container_name: payaid-local-postgres
    environment:
      POSTGRES_USER: payaid
      POSTGRES_PASSWORD: payaid
      POSTGRES_DB: payaid_v3
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Use 5433 to avoid clashing with an existing local Postgres.
      - "5433:5432"
    volumes:
      - payaid-local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payaid -d payaid_v3"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: payaid-local-redis
    ports:
      - "6379:6379"
    volumes:
      - payaid-local-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 11: ONLYOFFICE Document Server (optional). Run: docker compose -f docker-compose.local-db.yml up -d onlyoffice
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: payaid-onlyoffice
    environment:
      - JWT_ENABLED=false
    ports:
      - "8080:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
    restart: unless-stopped
    profiles:
      - onlyoffice

volumes:
  payaid-local-postgres-data:
  payaid-local-redis-data:
  onlyoffice-data:
  onlyoffice-logs:

