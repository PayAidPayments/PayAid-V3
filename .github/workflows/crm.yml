# Phase 10: CRM app CI – prisma validate, lint, build; optional deploy preview on PR.
name: CRM CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        working-directory: .

      - name: Turbo lint
        run: npx turbo run lint --filter=crm --filter=hr --filter=voice --filter=dashboard --concurrency 4
        continue-on-error: true

  build-crm:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build CRM
        run: npx turbo run build --filter=crm --concurrency 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://local:local@localhost:5432/local?schema=public' }}
          SKIP_ENV_VALIDATION: '1'

  # Optional: run Playwright when DATABASE_URL and PLAYWRIGHT_BASE_URL are set (e.g. in repo secrets).
  # e2e:
  #   runs-on: ubuntu-latest
  #   needs: build-crm
  #   if: github.event_name == 'pull_request' && secrets.DATABASE_URL != ''
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: ${{ env.NODE_VERSION }}, cache: 'npm' }
  #     - run: npm ci
  #     - run: npx prisma generate
  #     - run: npx playwright install --with-deps chromium
  #     - run: npm run test:e2e:no-verify
  #       env:
  #         DATABASE_URL: ${{ secrets.DATABASE_URL }}
  #         PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build-crm
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy CRM to Vercel (optional)
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            npx vercel --prod --cwd apps/crm --token ${{ secrets.VERCEL_TOKEN }}
          else
            echo "VERCEL_TOKEN not set; skip deploy. Set in repo secrets for auto-deploy."
          fi
        continue-on-error: true
