name: Performance Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]

jobs:
  perf-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Start app
        run: npm run start &
      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time" >&2
          exit 1
      - name: Run Playwright performance suite
        run: npm run perf:ui
        env:
          PERF_BASE_URL: http://127.0.0.1:3000
          PERF_TENANT_ID: ${{ vars.PERF_TENANT_ID }}
          PERF_TEST_EMAIL: ${{ secrets.PERF_TEST_EMAIL }}
          PERF_TEST_PASSWORD: ${{ secrets.PERF_TEST_PASSWORD }}

  perf-api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Start app
        run: npm run start &
      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time" >&2
          exit 1
      - name: Install k6
        run: |
          sudo gpg -k
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Run platform API load suite
        run: npm run perf:api:platform
        env:
          PERF_BASE_URL: http://127.0.0.1:3000
          PERF_TENANT_ID: ${{ vars.PERF_TENANT_ID }}
          PERF_API_TOKEN: ${{ secrets.PERF_API_TOKEN }}
