name: Vercel fix production alias

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Git commit SHA (resolves latest READY production deployment when set)
        required: false
        default: ''
      deployment_url:
        description: Ready deployment URL to promote (ignored when commit_sha is set)
        required: false
        default: https://payaid-v3-5lw7qy5w7-payaid-projects-a67c6b27.vercel.app
      production_alias:
        description: Production hostname to assign
        required: true
        default: payaid-v3.vercel.app

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deployment URL by commit
        if: inputs.commit_sha != ''
        id: resolve
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Add VERCEL_TOKEN in repo Secrets."
            exit 1
          fi
          node scripts/vercel-resolve-production-deployment.mjs | tee resolve.json
          echo "deployment_url=$(node -pe "JSON.parse(require('fs').readFileSync('resolve.json','utf8')).deploymentUrl")" >> "$GITHUB_OUTPUT"

      - name: Assign production alias via Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_DEPLOYMENT_URL: ${{ steps.resolve.outputs.deployment_url || inputs.deployment_url }}
          VERCEL_PRODUCTION_ALIAS: ${{ inputs.production_alias }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Add VERCEL_TOKEN (and optional VERCEL_ORG_ID) in repo Secrets, then re-run."
            exit 1
          fi
          node scripts/vercel-promote-production-alias.mjs

      - name: Smoke probe production host
        continue-on-error: true
        env:
          CANONICAL_STAGING_BASE_URL: https://${{ inputs.production_alias }}
        run: |
          if [ -f scripts/assurance-staging-probe.mjs ]; then
            node scripts/assurance-staging-probe.mjs
          else
            echo "assurance-staging-probe.mjs not on this ref; skipping"
          fi
