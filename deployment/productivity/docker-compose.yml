# PayAid Productivity: ONLYOFFICE Document Server (Sheets, Docs, Slides)
# Optional: Run Jitsi separately - see README for docker-jitsi-meet.
# Usage: docker compose up -d
# Then set in PayAid V3: OFFICE_SERVER_URL=http://localhost:8080 (or https://office.payaid.app)

services:
  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: payaid-onlyoffice
    depends_on:
      onlyoffice-postgresql:
        condition: service_healthy
      onlyoffice-rabbitmq:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: onlyoffice-postgresql
      DB_PORT: "5432"
      DB_NAME: onlyoffice
      DB_USER: onlyoffice
      DB_PWD: onlyoffice
      AMQP_URI: amqp://guest:guest@onlyoffice-rabbitmq
      # Uncomment to validate JWT from PayAid (use same JWT_SECRET as PayAid V3)
      # JWT_ENABLED: "true"
      # JWT_SECRET: "${DOCUMENT_SERVER_JWT_SECRET:-your-jwt-secret}"
      # JWT_HEADER: Authorization
      # JWT_IN_BODY: "true"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    stdin_open: true
    restart: unless-stopped
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files

  onlyoffice-postgresql:
    image: postgres:15-alpine
    container_name: payaid-onlyoffice-db
    environment:
      POSTGRES_DB: onlyoffice
      POSTGRES_USER: onlyoffice
      POSTGRES_PASSWORD: onlyoffice
    restart: unless-stopped
    volumes:
      - onlyoffice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 5s

  onlyoffice-rabbitmq:
    image: rabbitmq:3-alpine
    container_name: payaid-onlyoffice-mq
    restart: unless-stopped
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 5s

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache:
  onlyoffice_pgdata:
